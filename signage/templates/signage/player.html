<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ design.name }} | Digital Signage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
        }
        #content {
            width: 100%;
            height: 100%;
            transform-origin: top left;
        }
    </style>
    <style id="user-css"></style>
</head>
<body>
    <div id="content"></div>

    <script>
        var DESIGN_SLUG = "{{ design.slug }}";
    </script>

    {% verbatim %}
    <script>
        // Global signage data API
        window.signageData = null;
        window.employeeData = null;
        window.designConfig = null;

        // Load design HTML/CSS/JS from API
        async function loadDesign() {
            try {
                const response = await fetch('/api/designs/' + DESIGN_SLUG + '/');
                const data = await response.json();

                // Store design config (store filter, date filter)
                window.designConfig = {
                    store_filter_id: data.store_filter_id || null,
                    date_filter_mode: data.date_filter_mode || 'current',
                };

                // Inject CSS (from css field + any <style> tags in HTML)
                let cssText = data.css || '';
                if (data.html) {
                    const styleMatches = data.html.match(/<style[^>]*>([\s\S]*?)<\/style>/gi);
                    if (styleMatches) {
                        styleMatches.forEach(function(tag) {
                            const inner = tag.replace(/<\/?style[^>]*>/gi, '');
                            cssText += '\n' + inner;
                        });
                    }
                }
                if (cssText) {
                    document.getElementById('user-css').textContent = cssText;
                }

                // Inject HTML (extract body content if it's a full HTML document)
                if (data.html) {
                    let html = data.html;
                    const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                    if (bodyMatch) {
                        html = bodyMatch[1];
                    }
                    document.getElementById('content').innerHTML = html;
                }

                // Execute user JS
                if (data.js) {
                    try {
                        const script = document.createElement('script');
                        script.textContent = data.js;
                        document.body.appendChild(script);
                    } catch (e) {
                        console.error('Error in design JavaScript:', e);
                    }
                }

                // Fetch data after design is loaded
                fetchSalesData();
            } catch (error) {
                console.error('Error loading design:', error);
            }
        }

        // Fetch all data (sales + employees) from API
        async function fetchSalesData() {
            try {
                // Build URL with store filter if configured on the design
                let url = '/api/data/all/';
                if (window.designConfig && window.designConfig.store_filter_id) {
                    url += '?store_id=' + window.designConfig.store_filter_id;
                }
                const response = await fetch(url);
                const data = await response.json();
                if (data.success) {
                    window.signageData = data.sales;
                    window.employeeData = data.employees;
                    // Dispatch events for custom scripts
                    window.dispatchEvent(new CustomEvent('signageDataLoaded', { detail: data.sales }));
                    window.dispatchEvent(new CustomEvent('employeeDataLoaded', { detail: data.employees }));
                    // Process template variables
                    processTemplate();
                }
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        // Get nested value from object using dot notation
        function getNestedValue(obj, path) {
            return path.split('.').reduce((current, key) => {
                return current && current[key] !== undefined ? current[key] : '';
            }, obj);
        }

        // Process template variables in the content
        function processTemplate() {
            if (!window.signageData) return;

            const content = document.getElementById('content');
            let html = content.innerHTML;

            // Replace {{variable}} patterns
            html = html.replace(/\{\{(\w+(?:\.\w+)*)\}\}/g, (match, path) => {
                if (path.startsWith('sales.')) {
                    return getNestedValue(window.signageData, path.replace('sales.', ''));
                }
                if (path.startsWith('employees.')) {
                    return getNestedValue(window.employeeData, path.replace('employees.', ''));
                }
                return match;
            });

            // Process loops: {{#each array}}...{{/each}}
            html = processLoops(html);

            content.innerHTML = html;
        }

        // Process {{#each}} loops
        function processLoops(html) {
            const loopRegex = /\{\{#each\s+([\w.]+)\}\}([\s\S]*?)\{\{\/each\}\}/g;

            return html.replace(loopRegex, (match, arrayPath, template) => {
                let array = null;

                if (arrayPath.startsWith('sales.')) {
                    array = getNestedValue(window.signageData, arrayPath.replace('sales.', ''));
                } else if (arrayPath.startsWith('employees.')) {
                    array = getNestedValue(window.employeeData, arrayPath.replace('employees.', ''));
                }

                if (!Array.isArray(array)) return '';

                return array.map((item, index) => {
                    let itemHtml = template;
                    itemHtml = itemHtml.replace(/\{\{this\.(\w+)\}\}/g, (m, prop) => {
                        return item[prop] !== undefined ? item[prop] : '';
                    });
                    itemHtml = itemHtml.replace(/\{\{@index\}\}/g, index);
                    return itemHtml;
                }).join('');
            });
        }

        // Auto-scale fixed-size content to fit viewport
        function autoScale() {
            const content = document.getElementById('content');
            if (!content || !content.firstElementChild) return;
            const child = content.firstElementChild;
            const style = window.getComputedStyle(child);
            const cw = parseInt(style.width);
            const ch = parseInt(style.height);
            // Only scale if the child has fixed dimensions larger than viewport
            if (cw > 100 && ch > 100 && (cw > window.innerWidth || ch > window.innerHeight)) {
                const scaleX = window.innerWidth / cw;
                const scaleY = window.innerHeight / ch;
                const scale = Math.min(scaleX, scaleY);
                content.style.transform = 'scale(' + scale + ')';
                content.style.width = cw + 'px';
                content.style.height = ch + 'px';
            }
        }

        // Load design then start data refresh cycle
        loadDesign();
        setInterval(fetchSalesData, 5 * 60 * 1000);
        // Auto-scale after a brief delay to let design render
        setTimeout(autoScale, 1500);
        window.addEventListener('resize', autoScale);
    </script>
    {% endverbatim %}
</body>
</html>
