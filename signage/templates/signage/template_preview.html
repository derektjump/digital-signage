<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ template.name }} - Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }

        /* Default branding variables */
        :root {
            --brand-primary: #6434f8;
            --brand-secondary: #00f0ff;
            --brand-accent: #ff5959;
            --brand-bg: #0a0a0f;
            --brand-text: #ffffff;
            --brand-heading-font: "Suisse Intl", "Inter", sans-serif;
            --brand-body-font: "Roboto Mono", monospace;
        }

        /* Override with branding from template or query params */
        {{ branding_css|safe }}
    </style>
    <style>
        /* Template CSS */
        {{ template.css_code|safe }}
    </style>
</head>
<body>
    {{ template.html_code|safe }}

    <script>
        {{ template.js_code|safe }}
    </script>
</body>
</html>
